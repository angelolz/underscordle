name: Sync Metadata

on:
    workflow_dispatch:

jobs:
    sync:
        if: github.repository == 'angelolz/underscordle' && github.actor == 'angelolz'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install

            - name: Install ffmpeg
              run: sudo apt-get update && sudo apt-get install -y ffmpeg

            - name: Pull Masters from R2
              run: node scripts/sync-r2.js pull-masters
              env:
                  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

            - name: Pull Data from R2
              run: node scripts/sync-r2.js pull-data
              env:
                  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

            - name: Scan Songs & Extract Art
              run: node scripts/scan-songs.js
              env:
                  MASTERS_DIR: ./out/masters
                  DATA_DIR: ./out/data
                  COVERS_DIR: ./out/covers

            - name: Push Metadata & Art to R2
              run: node scripts/sync-r2.js push-data
              env:
                  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
