name: Daily Challenges

on:
    schedule:
        - cron: '0 23 * * *'
    workflow_dispatch:
        inputs:
            target_date:
                description: 'Specific date to generate (YYYY-MM-DD)'
                required: false
                default: ''
            start_date:
                description: 'Start date for range (YYYY-MM-DD)'
                required: false
                default: ''
            end_date:
                description: 'End date for range (YYYY-MM-DD)'
                required: false
                default: ''

jobs:
    generate:
        if: github.repository == 'angelolz/underscordle' && (github.event_name == 'schedule' || github.actor == 'angelolz')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install

            - name: Install ffmpeg
              run: sudo apt-get update && sudo apt-get install -y ffmpeg

            - name: Restore cache
              id: cache-restore
              uses: actions/cache@v5
              with:
                  path: |
                      out/data
                      out/masters
                      out/covers
                  key: underscordle-cache-${{ github.run_id }}
                  restore-keys: underscordle-cache-

            - name: Pull Masters & Data from R2
              if: steps.cache-restore.outputs.cache-matched-key == ''
              run: |
                  node scripts/sync-r2.js pull-masters
                  node scripts/sync-r2.js pull-data
              env:
                  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

            - name: Generate Snippets
              run: |
                  START_DATE="${{ github.event.inputs.start_date }}"
                  END_DATE="${{ github.event.inputs.end_date }}"
                  TARGET_DATE="${{ github.event.inputs.target_date }}"

                  if [ -n "$START_DATE" ] && [ -n "$END_DATE" ]; then
                      echo "Generating range: $START_DATE to $END_DATE"
                      CURRENT="$START_DATE"
                      while [[ "$CURRENT" < "$END_DATE" || "$CURRENT" == "$END_DATE" ]]; do
                          echo "Processing $CURRENT..."
                          node scripts/generate-daily.js "$CURRENT"
                          CURRENT=$(date -I -d "$CURRENT + 1 day")
                      done
                  else
                      if [ -z "$TARGET_DATE" ]; then
                          TARGET_DATE=$(date -d "tomorrow" +%Y-%m-%d)
                      fi
                      echo "Generating for date: $TARGET_DATE"
                      node scripts/generate-daily.js "$TARGET_DATE"
                  fi
              env:
                  MASTERS_DIR: ./out/masters
                  DATA_DIR: ./out/data
                  OUTPUT_DIR: ./out/dailies

            - name: Push Snippets to R2
              run: node scripts/sync-r2.js push-challenges
              env:
                  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
